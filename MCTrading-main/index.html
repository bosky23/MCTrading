<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Registre des prix — Shop du serveur</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #14110f;
    --panel: #1d1915;
    --panel-border: #35302a;
    --gold: #c9a227;
    --gold-bright: #e8c34a;
    --text: #e9e2d3;
    --text-dim: #a89f8c;
    --up: #7fae5a;
    --down: #b5473f;
    --font-display: "Cinzel", Georgia, serif;
    --font-body: "Inter", system-ui, sans-serif;
  }

  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600&display=swap');

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(201,162,39,0.06), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(201,162,39,0.05), transparent 40%);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    padding: 32px 20px 60px;
  }

  header {
    max-width: 900px;
    margin: 0 auto 28px;
    text-align: center;
  }

  header .eyebrow {
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
  }

  header h1 {
    font-family: var(--font-display);
    font-size: 34px;
    margin: 0 0 6px;
    color: var(--gold-bright);
    letter-spacing: 0.02em;
  }

  header p {
    color: var(--text-dim);
    font-size: 14px;
    margin: 0;
  }

  .wrap {
    max-width: 900px;
    margin: 0 auto;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    padding: 22px;
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .controls label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    display: block;
    margin-bottom: 6px;
  }

  select {
    background: #0f0d0b;
    color: var(--text);
    border: 1px solid var(--panel-border);
    border-radius: 4px;
    padding: 9px 14px;
    font-family: var(--font-body);
    font-size: 15px;
    min-width: 220px;
  }

  .stat-row {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }

  .stat {
    text-align: right;
  }

  .stat .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
  }

  .stat .value {
    font-family: var(--font-display);
    font-size: 22px;
    color: var(--gold-bright);
  }

  .stat .value.down { color: var(--down); }
  .stat .value.up { color: var(--up); }

  canvas {
    max-height: 360px;
  }

  footer {
    max-width: 900px;
    margin: 24px auto 0;
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
  }

  footer a { color: var(--gold); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  .empty {
    text-align: center;
    color: var(--text-dim);
    padding: 40px 0;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Registre marchand</div>
  <h1>Suivi des prix du shop</h1>
  <p>Relevés soumis par les joueurs, toutes les ~3 heures</p>
</header>

<div class="wrap">
  <div class="panel">
    <div class="controls">
      <div>
        <label for="item-select">Objet</label>
        <select id="item-select"></select>
      </div>
      <div class="stat-row">
        <div class="stat">
          <div class="label">Dernier prix</div>
          <div class="value" id="stat-last">—</div>
        </div>
        <div class="stat">
          <div class="label">Min / Max</div>
          <div class="value" id="stat-minmax" style="font-size:16px;">—</div>
        </div>
      </div>
    </div>
    <canvas id="price-chart"></canvas>
    <div id="empty-msg" class="empty" style="display:none;">Aucune donnée pour cet objet pour le moment.</div>
  </div>
</div>

<footer>
  Données ouvertes aux contributions via <a href="https://github.com/" target="_blank">pull request</a> sur <code>data/prices.json</code>
</footer>

<script>
async function main() {
  const res = await fetch('data/prices.json');
  const raw = await res.json();

  // Regrouper par item
  const byItem = {};
  for (const entry of raw) {
    if (!byItem[entry.item]) byItem[entry.item] = [];
    byItem[entry.item].push(entry);
  }
  for (const item in byItem) {
    byItem[item].sort((a, b) => new Date(a.date) - new Date(b.date));
  }

  const select = document.getElementById('item-select');
  Object.keys(byItem).sort().forEach(item => {
    const opt = document.createElement('option');
    opt.value = item;
    opt.textContent = item;
    select.appendChild(opt);
  });

  const ctx = document.getElementById('price-chart').getContext('2d');
  let chart;

  function render(item) {
    const entries = byItem[item] || [];
    const emptyMsg = document.getElementById('empty-msg');
    const canvas = document.getElementById('price-chart');

    if (entries.length === 0) {
      emptyMsg.style.display = 'block';
      canvas.style.display = 'none';
      document.getElementById('stat-last').textContent = '—';
      document.getElementById('stat-minmax').textContent = '—';
      return;
    }
    emptyMsg.style.display = 'none';
    canvas.style.display = 'block';

    const labels = entries.map(e => new Date(e.date).toLocaleString('fr-FR', {
      day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
    }));
    const prices = entries.map(e => e.prix);

    const last = prices[prices.length - 1];
    const prev = prices.length > 1 ? prices[prices.length - 2] : last;
    const lastEl = document.getElementById('stat-last');
    lastEl.textContent = last.toLocaleString('fr-FR');
    lastEl.className = 'value ' + (last > prev ? 'up' : last < prev ? 'down' : '');

    document.getElementById('stat-minmax').textContent =
      Math.min(...prices).toLocaleString('fr-FR') + ' / ' + Math.max(...prices).toLocaleString('fr-FR');

    if (chart) chart.destroy();
    chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: item,
          data: prices,
          borderColor: '#c9a227',
          backgroundColor: 'rgba(201,162,39,0.12)',
          pointBackgroundColor: '#e8c34a',
          pointRadius: 3,
          tension: 0.25,
          fill: true,
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false }
        },
        scales: {
          x: { ticks: { color: '#a89f8c' }, grid: { color: '#2a2620' } },
          y: { ticks: { color: '#a89f8c' }, grid: { color: '#2a2620' } }
        }
      }
    });
  }

  select.addEventListener('change', () => render(select.value));
  if (select.options.length > 0) render(select.value);
}

main();
</script>

</body>
</html>
