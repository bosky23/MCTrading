name: Valider les prix

on:
  pull_request:
    paths:
      - "data/prices.json"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Valider data/prices.json
        run: python3 scripts/validate.py
